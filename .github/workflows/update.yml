name: 每日更新金价数据

on:
  schedule:
    # 北京时间每天 18:00（UTC 10:00）。GitHub cron 用 UTC。
    - cron: '0 10 * * *'
  workflow_dispatch: # 允许在 Actions 页手动触发，便于验证

permissions:
  contents: write # 允许把更新后的数据 commit & push 回仓库

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行每日更新脚本
        run: node scripts/update_daily.js

      - name: 提交数据变更（若有）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/gold_prices.json)" ]; then
            git add data/gold_prices.json
            git commit -m "chore: 每日更新金价数据 ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "数据无变化，跳过提交。"
          fi
